modules:
  jira:dashboardGadget:
    - key: barra-punti-stagionali-dashboard-gadget-lidia
      title: Barra punti stagionali - Lidia
      description: Mostra le task completate dall'utente nella stagione corrente.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main-resource-lidia
      render: native
      resolver:
        function: resolver

  jira:issuePanel:
    - key: golden-ticket-panel-lidia
      title: Golden Ticket - Lidia
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: golden-ticket-ui-lidia
      render: native
      resolver:
        function: resolver

  trigger:
    - key: task-completed-trigger-lidia
      function: onIssueUpdated
      events:
        - avi:jira:updated:issue

  function:
    - key: resolver
      handler: index.handler
    - key: onIssueUpdated
      handler: index.issueUpdatedHandler

resources:
  - key: main-resource-lidia
    path: src/frontend/index-lidia.jsx
  - key: golden-ticket-ui-lidia
    path: src/frontend/goldenTicket-lidia.jsx

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/319e1dbd-d817-4c7b-821c-64aa542da417