modules:
  jira:issuePanel:
    - key: golden-ticket-hello-world-issue-panel-lidia
      resource: main-lidia
      resolver:
        function: resolver
      render: native
      title: Golden Ticket - Lidia
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main-lidia
    path: src/frontend/index-lidia.jsx
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/61bae854-2c07-4545-801b-895bfc02767b
permissions:
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
