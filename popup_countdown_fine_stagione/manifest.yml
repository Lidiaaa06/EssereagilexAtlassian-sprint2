modules:
  jira:dashboardGadget:
    - key: popup-countdown-fine-stagione-dashboard-gadget-lidia
      title: Countdown fine stagione popup - Lidia
      description: Mostra il tempo rimanente alla fine della stagione con alert a 7, 3
        e 1 giorno.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main-resource-lidia
      render: native
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main-resource-lidia
    path: src/frontend/index-lidia.jsx

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/dcee3f57-8494-4d5f-a2ee-a79230810222
