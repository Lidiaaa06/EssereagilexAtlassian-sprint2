modules:
  jira:issuePanel:
    - key: segnala-aiuto-2-hello-world-issue-panel-lidia
      resource: main-lidia
      resolver:
        function: resolver
      render: native
      title: Segnala Aiuto - Lidia
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg

  jira:dashboardGadget:
    - key: segnala-aiuto-classifica-gadget-lidia
      title: Classifica Aiuto - Lidia
      description: Classifica basata sui punti aiuto.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: classifica-res-lidia
      render: native
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main-lidia
    path: src/frontend/index-lidia.jsx
  - key: classifica-res-lidia
    path: src/frontend/classifica-lidia.jsx

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - write:jira-work
    - storage:app
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/78d12750-1919-4a49-bb0e-ea6c544d1210